api:
  dashboard: true
  insecure: true

# GET /ping on entrypoint web — use to verify cloudflared → Traefik (200 = reachability OK).
ping:
  entryPoint: web

entryPoints:
  web:
    address: ":80"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO
