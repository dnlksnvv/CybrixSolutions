# Локальный LiveKit Server (режим разработки, без LiveKit Cloud).
# Запуск из этой папки: docker compose up
#
# Ключи для агента и Client/.env:
#   LIVEKIT_URL=ws://127.0.0.1:7880
#   LIVEKIT_API_KEY=devkey
#   LIVEKIT_API_SECRET=secret
#
# Док: https://github.com/livekit/livekit#running-livekit

services:
  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
