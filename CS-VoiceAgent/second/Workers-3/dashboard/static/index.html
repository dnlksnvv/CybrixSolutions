<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cybrix Worker Trace</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: #0b0f17;
        color: #e6edf3;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid #1f2a3a;
        background: rgba(11,15,23,.9);
        backdrop-filter: blur(8px);
      }
      .pill {
        padding: 4px 10px;
        border: 1px solid #233146;
        border-radius: 999px;
        font-size: 12px;
        color: #aab7c6;
      }
      .ok { border-color: #1f6f3b; color: #7ee787; }
      .bad { border-color: #8e2a2a; color: #ff7b72; }
      main { padding: 14px 16px; }
      .grid {
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: 14px;
      }
      @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }
      .card {
        border: 1px solid #1f2a3a;
        border-radius: 12px;
        background: #0f1624;
        overflow: hidden;
      }
      .card h2 {
        margin: 0;
        padding: 10px 12px;
        font-size: 13px;
        letter-spacing: .3px;
        color: #aab7c6;
        border-bottom: 1px solid #1f2a3a;
      }
      #timeline { padding: 10px 12px; font-size: 12px; }
      .row {
        display: grid;
        grid-template-columns: 140px 120px 1fr;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px dashed #1f2a3a;
        align-items: start;
      }
      .row:last-child { border-bottom: none; }
      .row.mile-llm-req { border-left: 3px solid #d2a8ff; padding-left: 8px; }
      .row.mile-llm-ft { border-left: 3px solid #79c0ff; padding-left: 8px; }
      .row.mile-tts1 { border-left: 3px solid #56d364; padding-left: 8px; }
      .row.mile-tts-audio { border-left: 3px solid #ffa657; padding-left: 8px; }
      .t { color: #8b949e; font-variant-numeric: tabular-nums; }
      .k { color: #79c0ff; }
      .v { color: #e6edf3; white-space: pre-wrap; word-break: break-word; }
      #raw { height: 520px; overflow: auto; padding: 10px 12px; font-size: 11px; color: #aab7c6; }
      code { color: #aab7c6; }
    </style>
  </head>
  <body>
    <header>
      <div class="pill" id="status">connecting…</div>
      <div class="pill" id="room">room: -</div>
      <div class="pill" id="job">job: -</div>
      <div class="pill" id="pid">pid: -</div>
      <div class="pill" id="stage">stage: -</div>
    </header>
    <main>
      <div class="grid">
        <section class="card">
          <h2>Timeline (latest 200 events)</h2>
          <div id="timeline"></div>
        </section>
        <section class="card">
          <h2>Raw events</h2>
          <pre id="raw"></pre>
        </section>
      </div>
    </main>
    <script>
      const $ = (id) => document.getElementById(id);
      const timeline = $("timeline");
      const raw = $("raw");
      const status = $("status");
      const room = $("room");
      const job = $("job");
      const pid = $("pid");
      const stage = $("stage");

      const buf = [];
      const bufMax = 200;

      function fmtTs(tsMs) {
        const d = new Date(tsMs);
        return d.toLocaleTimeString(undefined, { hour12: false }) + "." + String(d.getMilliseconds()).padStart(3, "0");
      }

      function milestoneClass(e) {
        if (e.type === "llm.request") return "mile-llm-req";
        if (e.type === "llm.first_token") return "mile-llm-ft";
        if (e.type === "tts.sentence.start" && e.first_for_reply) return "mile-tts1";
        if (e.type === "tts.first_audio") return "mile-tts-audio";
        return "";
      }

      function render() {
        timeline.innerHTML = buf.map(e => {
          const mc = milestoneClass(e);
          const t = `<div class="t">${fmtTs(e.ts_ms || Date.now())}</div>`;
          const k = `<div class="k">${(e.type || "event")}</div>`;
          const v = `<div class="v">${escapeHtml(e.msg ?? JSON.stringify(e))}</div>`;
          return `<div class="row ${mc}">${t}${k}${v}</div>`;
        }).join("");
      }

      function escapeHtml(s) {
        return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
      }

      const es = new EventSource("/events");
      es.onopen = () => {
        status.textContent = "connected";
        status.className = "pill ok";
      };
      es.onerror = () => {
        status.textContent = "disconnected";
        status.className = "pill bad";
      };
      es.onmessage = (ev) => {
        try {
          const e = JSON.parse(ev.data);
          buf.push(e);
          if (buf.length > bufMax) buf.splice(0, buf.length - bufMax);
          render();

          raw.textContent = (raw.textContent + ev.data + "\n").split("\n").slice(-600).join("\n");
          raw.scrollTop = raw.scrollHeight;

          if (e.room) room.textContent = "room: " + e.room;
          if (e.job_id) job.textContent = "job: " + e.job_id;
          if (e.pid) pid.textContent = "pid: " + e.pid;
          if (e.type) stage.textContent = "stage: " + e.type;
        } catch {}
      };
    </script>
  </body>
</html>
